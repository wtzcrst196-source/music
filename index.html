<!DOCTYPE html>
<html>
<head>

<title>My Spotify</title>

<style>

body{
background:#121212;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.player{
width:380px;
background:#181818;
padding:20px;
border-radius:15px;
}

.cover{
width:100%;
height:200px;
background:#333;
border-radius:10px;
margin-bottom:15px;
display:flex;
align-items:center;
justify-content:center;
font-size:50px;
}

.title{
font-size:18px;
margin-bottom:10px;
}

.controls{
margin-top:10px;
}

button{
background:#1db954;
border:none;
padding:10px 15px;
margin:5px;
border-radius:20px;
color:white;
cursor:pointer;
}

.progress{
width:100%;
}

.playlist{
margin-top:20px;
max-height:150px;
overflow:auto;
}

.song{
padding:8px;
border-bottom:1px solid #333;
cursor:pointer;
}

.song:hover{
background:#282828;
}

</style>

</head>

<body>

<div class="player">

<div class="cover">🎵</div>

<div id="title">Loading...</div>

<audio id="audio"></audio>

<input type="range" id="progress" class="progress">

<div class="controls">

<button onclick="prevSong()">⏮</button>
<button onclick="playPause()">▶</button>
<button onclick="nextSong()">⏭</button>

</div>

<div class="playlist" id="playlist"></div>

</div>

<script>

const songs = [

{name:"Song 1",src:"songs/song1.mp3"},
{name:"Song 2",src:"songs/song2.mp3"},
{name:"Song 3",src:"songs/song3.mp3"}

];

let songIndex = 0;

const audio=document.getElementById("audio");
const title=document.getElementById("title");
const progress=document.getElementById("progress");
const playlist=document.getElementById("playlist");

function loadSong(){

audio.src=songs[songIndex].src;
title.innerText=songs[songIndex].name;

}

function playPause(){

if(audio.paused){

audio.play();

}else{

audio.pause();

}

}

function nextSong(){

songIndex++;

if(songIndex>=songs.length){

songIndex=0;

}

loadSong();
audio.play();

}

function prevSong(){

songIndex--;

if(songIndex<0){

songIndex=songs.length-1;

}

loadSong();
audio.play();

}

audio.addEventListener("ended",nextSong);

audio.addEventListener("timeupdate",()=>{

progress.value=(audio.currentTime/audio.duration)*100;

});

progress.addEventListener("input",()=>{

audio.currentTime=(progress.value/100)*audio.duration;

});

songs.forEach((song,index)=>{

const div=document.createElement("div");

div.classList.add("song");

div.innerText=song.name;

div.onclick=()=>{

songIndex=index;

loadSong();

audio.play();

};

playlist.appendChild(div);

});

loadSong();

</script>

</body>
</html>
