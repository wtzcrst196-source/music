<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Spotify Player</title>

<style>
body{
background:#121212;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
}

.player{
width:360px;
background:#181818;
border-radius:20px;
padding:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.6);
color:white;
}

.song-name{
text-align:center;
font-size:18px;
margin-bottom:15px;
}

.progress{
width:100%;
height:6px;
background:#333;
border-radius:10px;
overflow:hidden;
cursor:pointer;
}

.progress-bar{
height:100%;
width:0%;
background:#1db954;
transition:width 0.1s linear;
}

.controls{
display:flex;
justify-content:center;
align-items:center;
gap:25px;
margin-top:20px;
}

.btn{
width:45px;
height:45px;
border-radius:50%;
background:#282828;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:18px;
transition:0.2s;
}

.btn:hover{
background:#1db954;
transform:scale(1.1);
}

.play{
width:60px;
height:60px;
font-size:22px;
background:#1db954;
color:black;
}

.play:hover{
transform:scale(1.15);
}
</style>
</head>

<body>

<div class="player">

<div class="song-name" id="songName">
Song 1
</div>

<div class="progress" id="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<div class="controls">

<div class="btn" id="prev">⏮</div>

<div class="btn play" id="play">▶</div>

<div class="btn" id="next">⏭</div>

</div>

</div>

<audio id="audio"></audio>

<script>

const songs=[
{name:"Song 1",src:"songs/song1.mp3"},
{name:"Song 2",src:"songs/song2.mp3"},
{name:"Song 3",src:"songs/song3.mp3"}
{name:"Next door",src:"songs/song3.mp3"}
]

let index=0

const audio=document.getElementById("audio")
const playBtn=document.getElementById("play")
const nextBtn=document.getElementById("next")
const prevBtn=document.getElementById("prev")
const progress=document.getElementById("progress")
const progressBar=document.getElementById("progressBar")
const songName=document.getElementById("songName")

function loadSong(){
audio.src=songs[index].src
songName.innerText=songs[index].name
}

function playSong(){
audio.play()
playBtn.innerText="⏸"
}

function pauseSong(){
audio.pause()
playBtn.innerText="▶"
}

playBtn.onclick=()=>{
if(audio.paused){
playSong()
}else{
pauseSong()
}
}

nextBtn.onclick=()=>{
index++
if(index>=songs.length) index=0
loadSong()
playSong()
}

prevBtn.onclick=()=>{
index--
if(index<0) index=songs.length-1
loadSong()
playSong()
}

audio.addEventListener("timeupdate",()=>{
const percent=(audio.currentTime/audio.duration)*100
progressBar.style.width=percent+"%"
})

progress.onclick=(e)=>{
const width=progress.clientWidth
const clickX=e.offsetX
const duration=audio.duration
audio.currentTime=(clickX/width)*duration
}

audio.onended=()=>{
nextBtn.onclick()
}

loadSong()

</script>

</body>
</html>
