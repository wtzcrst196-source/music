<!DOCTYPE html>
<html>

<head>

<title>My Music</title>

<style>

body{
background:#121212;
color:white;
font-family:Arial;
margin:0;
}

header{
text-align:center;
padding:20px;
font-size:28px;
}

.song{
background:#1e1e1e;
padding:15px;
margin:10px;
border-radius:10px;
cursor:pointer;
}

.song:hover{
background:#333;
}

#songs{
padding-bottom:120px;
}

.player{

position:fixed;
bottom:0;
left:0;
right:0;
background:black;
padding:15px;
text-align:center;

}

.controls button{

margin:5px;
padding:10px 18px;
border:none;
border-radius:8px;
background:#1db954;
color:white;
cursor:pointer;

}

audio{
width:90%;
margin-top:10px;
}

</style>

</head>

<body>

<header>🎧 My Music</header>

<div id="songs"></div>

<div class="player">

<div class="controls">

<button onclick="prevSong()">⏮</button>

<button onclick="nextSong()">⏭</button>

<button onclick="shuffleSong()">🔀</button>

</div>

<audio id="player" controls></audio>

</div>

<script>

let songs=[]
let current=0

async function loadSongs(){

const api="https://api.github.com/repos/wtzcrst196-source/music/contents/songs"

const res=await fetch(api)

const data=await res.json()

songs=data
.filter(file=>file.name.endsWith(".mp3"))
.map(file=>file.download_url)

renderSongs()

}

function renderSongs(){

const container=document.getElementById("songs")

songs.forEach((url,i)=>{

let name=url.split("/").pop()

let div=document.createElement("div")

div.className="song"

div.innerText=name

div.onclick=()=>playSong(i)

container.appendChild(div)

})

}

function playSong(i){

current=i

let player=document.getElementById("player")

player.src=songs[i]

player.play()

}

function nextSong(){

current++

if(current>=songs.length){

current=0

}

playSong(current)

}

function prevSong(){

current--

if(current<0){

current=songs.length-1

}

playSong(current)

}

function shuffleSong(){

let r=Math.floor(Math.random()*songs.length)

playSong(r)

}

loadSongs()

</script>

</body>

</html>
